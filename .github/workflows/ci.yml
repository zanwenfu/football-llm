name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install "ruff>=0.5" "black>=24.0"
      - name: Ruff
        run: ruff check src/ tests/ scripts/
      - name: Black
        run: black --check src/ tests/ scripts/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package (baselines + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[baselines,dev]"
      - name: Run tests
        run: pytest -v --cov=src/football_llm --cov-report=term-missing

  secrets:
    name: Secrets scan (detect-secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install detect-secrets
        run: pip install "detect-secrets>=1.5"
      - name: Scan
        run: |
          if [ -f .secrets.baseline ]; then
            detect-secrets scan --baseline .secrets.baseline
          else
            detect-secrets scan > /tmp/secrets_report.txt
            if [ -s /tmp/secrets_report.txt ] && grep -q '"type"' /tmp/secrets_report.txt; then
              # Only fail if actual secrets were found (not just the meta-report structure)
              python -c "
          import json, sys
          with open('/tmp/secrets_report.txt') as f:
              report = json.load(f)
          if report.get('results'):
              print('Potential secrets detected:')
              print(json.dumps(report['results'], indent=2))
              sys.exit(1)
          print('No secrets detected.')
          "
            fi
          fi

  reproduce:
    name: Reproduce paper (smoke test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[baselines,dev]"
      - name: Run reproduce_paper.py (skip bootstrap for speed)
        run: python scripts/reproduce_paper.py --skip-bootstrap --skip-figures
      - name: Upload generated figures
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paper-figures
          path: figures/
          if-no-files-found: ignore
